      - 全文搜索、触发器、索引
      必须完全遵循: database-unified-design.md 第96-285行
    agent: backend-architect
    complexity: L
    status: pending
    deliverables:
      - backend/alembic/versions/001_initial_schema.py
    dependencies:
      - TASK-002
    design_ref: "database-unified-design.md#PostgreSQL主数据库设计"

  - id: TASK-004
    parent: "1.4"
    title: Setup pytest async
    description: |
      配置测试环境：
      - pytest-asyncio
      - httpx测试客户端
      - 测试数据库fixture
    agent: qa-engineer
    complexity: S
    status: pending
    deliverables:
