  # Phase 1: Project Setup & Database
  # ============================================
  - id: TASK-001
    parent: "1.1"
    title: Setup PostgreSQL connection
    description: |
      配置异步数据库连接：
      - SQLAlchemy 2.0 async engine
      - 连接池配置
      - 环境变量管理
      参考: database-unified-design.md 第36-60行
    agent: backend-architect
    complexity: S
    status: pending
    deliverables:
      - backend/app/core/database.py
      - backend/.env.example
    design_ref: "database-unified-design.md#数据库架构总览"

  - id: TASK-002
    parent: "1.2"
    title: Configure Alembic migrations
    description: |
      配置Alembic迁移框架：
      - 初始化alembic目录
      - 配置env.py支持async
    agent: backend-architect
    complexity: S
    status: pending
    deliverables:
      - backend/alembic/
      - backend/alembic.ini
    dependencies:
