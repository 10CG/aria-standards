## Field Definitions

### Required Fields
- **id**: Unique task identifier (TASK-{NNN})
- **parent**: Reference to tasks.md numbering (e.g., "1.1")
- **title**: Human-readable task title
- **status**: Task status
- **complexity**: Task complexity level
- **estimated_hours**: Time estimate (range or single value)
- **dependencies**: List of dependent task IDs
- **deliverables**: List of expected deliverables

### Optional Fields
- **agent**: Assigned agent type
- **reason**: Reason for agent assignment
- **verification**: List of verification criteria
- **notes**: Additional notes or context
- **completed_at**: Timestamp when status changed to completed

### Status Values
- **pending**: Ready to start
- **in_progress**: Currently being worked on
- **completed**: Finished successfully
- **blocked**: Cannot proceed due to dependencies or issues

### Complexity Levels
- **S** (Small): 1-2 hours, single file change
- **M** (Medium): 2-4 hours, multiple files
- **L** (Large): 4-8 hours, complex feature
- **XL** (Extra Large): 8+ hours, major feature

### Agent Types
- **backend-architect**: Backend development, API design, database
- **mobile-developer**: Flutter/Dart, UI components, mobile apps
- **frontend-developer**: Web development, React/Vue/Angular
- **qa-engineer**: Testing, quality assurance
- **api-documenter**: API documentation, OpenAPI specs
- **knowledge-manager**: Documentation, architecture docs
- **tech-lead**: Architecture decisions, cross-team coordination

---

## Dual-Layer Architecture

This detailed-tasks.yaml file serves as Layer 2 (fine-grained) in the dual-layer architecture:

- **Layer 1** (tasks.md): Coarse-grained functional checklist
- **Layer 2** (this file): Detailed task specifications for AI execution

### Synchronization Mechanism

#### Forward Sync (A.1 → A.2 → A.3)
1. **A.1 (spec-drafter)**: Creates tasks.md with checkbox format
2. **A.2 (task-planner)**: Parses tasks.md, generates detailed-tasks.yaml
3. **A.3 (task-planner)**: Adds agent assignment and verification

#### Backward Sync (B.2 → tasks.md)
When a task status changes to `completed`:
1. Read the task's `parent` field (e.g., "1.1")
2. Locate corresponding item in tasks.md
3. Update checkbox: `- [ ]` → `- [x]`
4. Commit both files

### Numbering Constraints

- **Immutability**: tasks.md numbering (1.1, 1.2, etc.) must not change after creation
- **Parent Reference**: `parent` field must always reference valid tasks.md numbering
- **Validation**: Run `openspec validate --numbering` to check consistency

---

## Usage Example

```bash
# Generate detailed-tasks.yaml from tasks.md
task-planner --spec-path changes/user-auth

# Validate dual-layer consistency
openspec validate --sync user-auth

# Check numbering integrity
openspec validate --numbering user-auth
```

---

## Integration with Skills

### task-planner
- Parses tasks.md to extract parent/numbering
- Generates initial detailed-tasks.yaml with all required fields
- Assigns agents based on deliverable analysis

### progress-updater
- Monitors task status changes
- Syncs completion back to tasks.md checkboxes
- Detects and reports conflicts

### openspec CLI
- `openspec validate --sync`: Check consistency between layers
- `openspec validate --numbering`: Verify numbering integrity
- `openspec show {feature}`: Display dual-layer overview