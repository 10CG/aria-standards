# Generated by task-planner v2.0.0
# Dual-Layer Architecture: tasks.md (coarse) + detailed-tasks.yaml (fine)
# Data Source: tasks.md (OpenSpec compatible) or proposal.md

metadata:
  feature: {Feature Name}
  created: {YYYY-MM-DDTHH:mm:ss+08:00}
  updated: {YYYY-MM-DDTHH:mm:ss+08:00}
  spec: standards/openspec/changes/{feature}/proposal.md
  datasource: "tasks.md"  # 或 "proposal.md"
  total_tasks: {N}
  estimated_hours: "{X-Y}"

tasks:
  # 必需字段示例
  - id: TASK-001
    parent: "1.1"  # 链接到 tasks.md 的编号 (OpenSpec 双层架构)
    title: {Task Title}
    status: pending  # pending | in_progress | completed | blocked
    complexity: M  # S | M | L | XL
    estimated_hours: "2-4"  # 范围或具体值
    dependencies: []  # TASK-ID 列表
    deliverables:
      - {File path or artifact 1}
      - {File path or artifact 2}

  # 完整字段示例
  - id: TASK-002
    parent: "1.2"
    title: {Task Title}
    status: pending
    complexity: L
    estimated_hours: "4-8"
    dependencies: [TASK-001]
    deliverables:
      - {File path}
      - {Another file path}
    # Agent 分配 (A.3)
    agent: backend-architect
    reason: "{Assignment reason}"
    # 验收标准
    verification:
      - "Verification criterion 1"
      - "Verification criterion 2"
      - "Coverage >= 85%"
    # 可选笔记
    notes: "{Additional notes about the task}"

  # 多个依赖示例
  - id: TASK-003
    parent: "2.1"
    title: {Task Title}
    status: pending
    complexity: M
    estimated_hours: "3-6"
    dependencies: [TASK-001, TASK-002]
    deliverables:
      - {File path}
    agent: qa-engineer
    reason: "Testing expertise required"
    verification:
      - "All test cases pass"
      - "Edge cases covered"

  # 已完成任务示例
  - id: TASK-004
    parent: "3.1"
    title: {Previously Completed Task}
    status: completed
    complexity: S
    estimated_hours: "1-2"
    dependencies: []
    deliverables:
      - {File path}
    agent: knowledge-manager
    reason: "Documentation update"
    verification:
      - "Document published"
      - "Team notified"
    completed_at: "2025-12-20T10:00:00+08:00"

